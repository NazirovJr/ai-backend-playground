spring.application.name=playground

# --- Spring AI: Ollama (локальная LLM) ---
# Адрес локального Ollama-сервера (по умолчанию он слушает этот порт)
spring.ai.ollama.base-url=http://localhost:11434
# Чат-модель, которую дёргаем (та, что у тебя установлена: ollama list)
# ВНИМАНИЕ: в Spring AI 2.0 из ключей убран сегмент .options (было chat.options.model)
spring.ai.ollama.chat.model=gemma4
# Чуть «спокойнее» ответы (0 = детерминированно, 1 = креативно)
spring.ai.ollama.chat.temperature=0.3
# Модель ЭМБЕДДИНГОВ — многоязычная (русский+англ), дефолт для RAG в 2026
spring.ai.ollama.embedding.model=bge-m3
# Не пытаться автоматически скачивать модель при старте — она уже есть
spring.ai.ollama.init.pull-model-strategy=never

# --- Actuator: наблюдаемость (метрики токенов, времени вызовов) ---
management.endpoints.web.exposure.include=health,metrics
management.endpoint.metrics.access=read_only

# --- PostgreSQL + pgvector (векторное хранилище) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
# Spring AI сам создаст расширение vector и таблицу vector_store при старте
spring.ai.vectorstore.pgvector.initialize-schema=true
# ВАЖНО: размерность должна совпадать с моделью bge-m3 (1024)
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
server.port=8081